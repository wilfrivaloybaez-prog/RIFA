<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Gran sorteo pegate y gana para tu madre</title>
    <style>
        body{ font-family: Arial, sans-serif; margin:0; background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb); color:white; }
        .container{ max-width:1100px; margin:auto; padding:20px; }
        header{ text-align:center; padding:20px; }
        header h1{ margin:0; font-size:32px; }
        header p{ font-size:18px; }
        .info{ background:rgba(255,255,255,0.1); padding:15px; border-radius:12px; margin-bottom:20px; }
        .form-box{ background:white; color:black; padding:20px; border-radius:12px; margin-bottom:20px; }
        input, button{ width:100%; padding:12px; margin-top:10px; border-radius:8px; border:1px solid #ccc; font-size:16px; }
        button{ background:#2563eb; color:white; border:none; cursor:pointer; font-weight:bold; }
        button:hover{ background:#1d4ed8; }
        .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(75px,1fr)); gap:10px; }
        .number{ padding:15px; text-align:center; border-radius:10px; font-weight:bold; cursor:pointer; min-height: 50px; display: flex; flex-direction: column; justify-content: center; align-items: center;}
        .free{ background:#16a34a; }
        .busy{ background:#dc2626; cursor:not-allowed; font-size: 0.8em; }
        .selected{ outline:4px solid yellow; box-shadow: 0 0 15px yellow; }
        footer{ text-align:center; padding:20px; opacity:0.9; }
        small { font-size: 10px; display: block; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; max-width: 60px; white-space: nowrap; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎉 Gran sorteo pegate y gana para tu madre 🎉</h1>
        <p>100 números disponibles | RD$100 por número</p>
    </header>

    <div class="info">
        Selecciona un número en verde, escribe tu nombre y dale a "Reservar".
    </div>

    <div class="form-box">
        <label>Nombre completo:</label>
        <input type="text" id="nombre" placeholder="Escribe tu nombre">
        <label>Número seleccionado:</label>
        <input type="text" id="numero" readonly placeholder="Toca un cuadro verde">
        <button id="btnReservar">Reservar número</button>
    </div>

    <div class="grid" id="tabla"></div>

    <footer>Rifa en tiempo real conectada a la nube.</footer>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Tu configuración (Sacada de tu imagen)
    const firebaseConfig = {
        apiKey: "AIzaSyC5xZzmtHOLjYiqM5FpL_dY7NvVbPgjhYk",
        authDomain: "rifa-b8d1f.firebaseapp.com",
        projectId: "rifa-b8d1f",
        storageBucket: "rifa-b8d1f.appspot.com",
        messagingSenderId: "404231196814",
        appId: "1:404231196814:web:3b931329ea4df5428139df"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let seleccionado = null;
    let datosRifa = {};

    // DIBUJAR LA TABLA
    function dibujarTabla() {
        const tabla = document.getElementById("tabla");
        tabla.innerHTML = "";

        for (let i = 1; i <= 100; i++) {
            let div = document.createElement("div");
            div.classList.add("number");
            
            if (datosRifa[i]) {
                div.classList.add("busy");
                div.innerHTML = `<span>${i}</span><small>${datosRifa[i].nombre}</small>`;
            } else {
                div.classList.add("free");
                div.innerHTML = i;
                div.onclick = () => {
                    seleccionado = i;
                    document.getElementById("numero").value = i;
                    dibujarTabla();
                };
            }

            if (seleccionado === i) div.classList.add("selected");
            tabla.appendChild(div);
        }
    }

    // ESCUCHAR CAMBIOS EN TIEMPO REAL
    onSnapshot(collection(db, "reservas"), (querySnapshot) => {
        datosRifa = {};
        querySnapshot.forEach((doc) => {
            datosRifa[doc.id] = doc.data();
        });
        dibujarTabla();
    });

    // FUNCIÓN RESERVAR
    document.getElementById("btnReservar").onclick = async () => {
        const nombre = document.getElementById("nombre").value.trim();
        const num = seleccionado;

        if (!nombre || !num) {
            alert("Por favor completa tu nombre y selecciona un número.");
            return;
        }

        if (datosRifa[num]) {
            alert("¡Lástima! Alguien acaba de ganar ese número.");
            return;
        }

        try {
            await setDoc(doc(db, "reservas", num.toString()), {
                nombre: nombre,
                fecha: new Date().toISOString()
            });
            alert("¡Número " + num + " reservado para " + nombre + "!");
            document.getElementById("nombre").value = "";
            document.getElementById("numero").value = "";
            seleccionado = null;
        } catch (e) {
            console.error(e);
            alert("Error: Asegúrate de haber activado 'Modo de prueba' en Firestore.");
        }
    };
</script>
</body>
</html>
